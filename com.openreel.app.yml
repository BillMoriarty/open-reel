app-id: com.openreel.app
runtime: org.gnome.Platform
runtime-version: '49'
sdk: org.gnome.Sdk//49
command: openreel

finish-args:
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland
  - --device=dri
  - --filesystem=home
  - --socket=pulseaudio
  - --own-name=org.mpris.MediaPlayer2.openreel
  - --talk-name=org.mpris.MediaPlayer2.*

cleanup:
  - /include
  - /lib/pkgconfig
  - /share/doc
  - /share/man
  - '*.la'
  - '*.a'

modules:
  - name: mutagen
    buildsystem: simple
    build-commands:
      - pip3 install --no-index --find-links=. --prefix=${FLATPAK_DEST} mutagen-1.47.0-py3-none-any.whl
    sources:
      - type: file
        url: https://files.pythonhosted.org/packages/py3/m/mutagen/mutagen-1.47.0-py3-none-any.whl
        sha256: edd96f50c5907a9539d8e5bba7245f62c9f520aef333d13392a79a4f70aca719
        dest-filename: mutagen-1.47.0-py3-none-any.whl

  - name: dbus-python
    buildsystem: meson
    config-opts:
      - -Dpython=python3
    sources:
      - type: archive
        url: https://files.pythonhosted.org/packages/source/d/dbus-python/dbus-python-1.4.0.tar.gz
        sha256: 991666e498f60dbf3e49b8b7678f5559b8a65034fdf61aae62cdecdb7d89c770

  - name: openreel
    buildsystem: simple
    build-commands:
      - install -Dm755 packaging/openreel-launcher.sh ${FLATPAK_DEST}/bin/openreel
      - mkdir -p ${FLATPAK_DEST}/lib/openreel
      - cp -r musicplayer ${FLATPAK_DEST}/lib/openreel/
      - cp run.py ${FLATPAK_DEST}/lib/openreel/
      - install -Dm644 assets/icon.svg ${FLATPAK_DEST}/share/icons/hicolor/scalable/apps/com.openreel.app.svg
      - install -Dm644 packaging/com.openreel.app.desktop ${FLATPAK_DEST}/share/applications/com.openreel.app.desktop
      - install -Dm644 packaging/com.openreel.app.metainfo.xml ${FLATPAK_DEST}/share/metainfo/com.openreel.app.metainfo.xml
    sources:
      - type: dir
        path: .
